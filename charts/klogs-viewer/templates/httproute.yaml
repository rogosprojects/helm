{{- if .Values.kgateway.enabled -}}
{{- $fullName := include "chart.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  namespace: {{ include "chart.namespace" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  {{- with .Values.kgateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.kgateway.parentRefs }}
    - name: {{ .name | quote }}
      {{- if .namespace }}
      namespace: {{ .namespace | quote }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName | quote }}
      {{- end }}
    {{- end }}
  {{- if .Values.kgateway.hostnames }}
  hostnames:
    {{- range .Values.kgateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    - matches:
        {{- range .Values.kgateway.paths }}
        - path:
            type: {{ .pathType }}
            value: {{ .path | quote }}
        {{- end }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
{{- end }}
